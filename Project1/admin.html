<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Администратор — Авоська</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <div class="brand"><div>Авоська</div></div>
        <ul>
          <li><a href="./index.html">Каталог</a></li>
          <li><a href="./orders.html">Заказы</a></li>
          <li><a href="./admin.html" data-auth-admin style="display:none">Админ</a></li>
        </ul>
        <div class="nav-actions">
          <span class="status-pill status-confirmed">Админ</span>
        </div>
      </div>
    </header>

    <main class="container">
      <h1>Панель администратора</h1>
      <div class="panel">
        <div class="toolbar">
          <input type="search" id="admin-search" placeholder="Поиск по товару" />
          <select id="admin-status">
            <option value="">Все статусы</option>
            <option value="новое">новое</option>
            <option value="подтверждено">подтверждено</option>
            <option value="отменено">отменено</option>
          </select>
          <button class="btn secondary" id="logout-btn" title="Выйти из аккаунта">Выйти</button>
        </div>
      </div>
      <div class="panel table-wrap">
        <table class="table" id="admin-orders">
          <thead>
            <tr>
              <th class="admin-compact-hide">ФИО</th>
              <th class="admin-compact-hide">Email</th>
              <th>Товар</th>
              <th>Кол-во</th>
              <th>Статус</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="admin-orders-body"></tbody>
        </table>
      </div>
    </main>
    <footer class="container">© 2024–2025 «Авоська»</footer>
    <script src="./script.js"></script>
  </body>
  </html>
